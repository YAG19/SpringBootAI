server:
  port: 8080

spring:
  application:
    name: springbootai
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# LLM Provider Configuration
# API keys are loaded from environment variables:
#   ANTHROPIC_API_KEY  - for Claude
#   OPENAI_API_KEY     - for OpenAI
# LM Studio does not require a real API key.
llm:
  claude:
    base-url: https://api.anthropic.com
    api-key: ${ANTHROPIC_API_KEY:}
    default-model: claude-sonnet-4-6
    anthropic-version: "2023-06-01"
  openai:
    base-url: https://api.openai.com
    api-key: ${OPENAI_API_KEY:}
    default-model: gpt-4o
  local:
    # LM Studio ngrok public URL (SDK API, not OpenAI-compatible)
    base-url: https://unfluorinated-lourdes-squashily.ngrok-free.dev
    # LM Studio accepts any non-empty string as the API key
    api-key: lm-studio
    # Model loaded in LM Studio
    default-model: qwen/qwen3-4b-thinking-2507

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
