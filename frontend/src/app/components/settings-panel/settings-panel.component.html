<form [formGroup]="form" class="settings-form">

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Provider</mat-label>
    <mat-select formControlName="provider">
      <mat-option value="LOCAL">
        <mat-icon>computer</mat-icon> LOCAL (LM Studio)
      </mat-option>
      <mat-option value="CLAUDE">
        <mat-icon>auto_awesome</mat-icon> CLAUDE (Anthropic)
      </mat-option>
      <mat-option value="OPENAI">
        <mat-icon>psychology</mat-icon> OPENAI (GPT)
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Model override</mat-label>
    <input matInput formControlName="model" placeholder="Use default" />
    <mat-hint>Leave blank to use the configured default</mat-hint>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>System prompt</mat-label>
    <textarea
      matInput
      formControlName="systemPrompt"
      placeholder="You are a helpful assistant."
      rows="3"
    ></textarea>
  </mat-form-field>

  <mat-divider></mat-divider>

  <div class="toggle-row">
    <span class="toggle-label">Streaming</span>
    <mat-slide-toggle formControlName="streaming" color="primary"></mat-slide-toggle>
  </div>

  <mat-divider></mat-divider>

  <button
    mat-stroked-button
    color="warn"
    class="full-width clear-btn"
    type="button"
    (click)="onClear()"
  >
    <mat-icon>delete_sweep</mat-icon>
    Clear conversation
  </button>

</form>
